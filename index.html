<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KashishFlix</title>

<style>
body{
  margin:0;
  background:#141414;
  color:white;
  font-family:Arial;
}

.logo{
  color:#E50914;
  font-size:35px;
  font-weight:bold;
  padding:20px;
}

.row{
  padding:20px;
}

.photos{
  display:flex;
  gap:15px;
  overflow-x:auto;
}

.photos img{
  width:180px;
  border-radius:10px;
  cursor:pointer;
}

#viewer{
  display:none;
  position:fixed;
  inset:0;
  background:black;
}

#viewer img{
  width:100%;
  height:100%;
  object-fit:contain;
}
</style>
</head>

<body>

<div class="logo">❤️ MOMENTS ❤️</div>

<div class="row">
<h2> Best Moments </h2>

<div class="photos">
<img src="Screenshot_20260530-193205_Instagram.png" onclick="openImg(this.src)">
<img src="Snapchat-1361467960.jpg" onclick="openImg(this.src)">
</div>

</div>

<div id="viewer" onclick="closeImg()">
<img id="big">
</div>

<script>
function openImg(src){
  document.getElementById("viewer").style.display="block";
  document.getElementById("big").src=src;
}

function closeImg(){
  document.getElementById("viewer").style.display="none";
}
</script>

</body>
</html>
